name: Compile and Test
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
jobs:
  compile_job:
    name: compile_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Haskell Stack
        uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: 'latest'

      - name: Cache Stack dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'redo-haskell.cabal') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Install hlint
        run: |
          sudo apt-get update
          sudo apt-get install -y hlint

      - name: Build redo
        run: ./do all

      - name: Run hlint
        run: hlint src/

      - name: Run tests
        run: |
          export PATH=$PWD/bin:$PATH
          redo test/all

      - name: Archive redo binaries
        uses: actions/upload-artifact@v4
        with:
          name: redo_bin
          path: ${{ github.workspace }}/bin
          if-no-files-found: ignore
