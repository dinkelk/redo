name: Compile and Test 
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
jobs:
  compile_job:
    name: compile_and_test
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - name: Build Docker image
        run: docker build -t redo-ci -f docker/Dockerfile .
      - name: Compile redo in Docker
        run: docker run --rm -v ${{ github.workspace }}:/workspace --workdir /workspace redo-ci ./do
      - name: Run hlint in Docker
        run: docker run --rm -v ${{ github.workspace }}:/workspace --workdir /workspace redo-ci hlint src/
      - name: Run tests in Docker
        run: docker run --rm -v ${{ github.workspace }}:/workspace --workdir /workspace redo-ci bash -c "PATH=\$PATH:./bin redo test/all"
      - name: Archive redo binaries
        uses: actions/upload-artifact@v4
        with:
          name: redo_bin
          path: ${{ github.workspace }}/bin
          if-no-files-found: ignore
      - run: echo "🍏 This job's status is ${{ job.status }}."
        if: always()
